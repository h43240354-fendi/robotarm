<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/arm.svg">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/base.css">
</head>
<body>
  <canvas id="iot-bg-canvas"></canvas>
  <div class="app-shell auth-shell">
    <div class="login-page">
      <div class="card">
      <div class="logo-wrap">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 4 21 h 2.5 l 0.5 -2 h 1.5 l 0.5 2 a 2 2 0 0 1 4 0 l 0.5 -2 h 1.5 l 0.5 2 h 2.5" />
          <path d="M 7.5 19 c 0.8 -1.5 2.2 -2.5 4.5 -2.5 s 3.7 1 4.5 2.5" />
          <path d="M 10.8 16.5 L 8 12.8" />
          <path d="M 12.5 17 L 9.3 11.5" />
          <circle cx="6.5" cy="11.5" r="2.5" />
          <circle cx="6.5" cy="11.5" r="0.8" /> 2)
          <path d="M 8.2 9.8 L 11.2 6.8" />
          <path d="M 7.2 8.2 L 10.2 5.2" />
          <circle cx="12" cy="5" r="2.5" />
          <circle cx="12" cy="5" r="0.8" />
          <path d="M 13.8 6.8 L 16.2 9.2" />
          <path d="M 12.8 5.8 L 15.2 8.2" />
          <circle cx="17.2" cy="10.8" r="1.2" />
          <path d="M 18.2 10 L 21 10 L 21.5 13" />
          <path d="M 17.5 11.8 L 17.5 13.5 L 20 14" />
        </svg>
        </div>
        <h1>LOGIN</h1>
        <p class="subtitle">Silahkan login terlebih dahulu untuk melanjutkan</p>
      </div>

        <form action="/api/login" method="POST">
          <div class="field">
            <div class="field-header">
              <label for="email">Alamat email</label>
            </div>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1A10 10 0 1 0 12 22h5"/></svg>
              </span>
              <input type="email" id="email" name="email" placeholder="user@gmail.com" autocomplete="email" required />
            </div>
            <p class="error-msg" id="email-error">Please enter a valid email address.</p>
          </div>

          <div class="field">
            <div class="field-header">
              <label for="password">Password</label>
              <p class="register-row"><a href="/reset" id="create-link">Lupa Password?</a></p>
            </div>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show/hide password">
                <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <p class="error-msg" id="pw-error">Password is required.</p>
          </div>

          <label class="remember">
            <input type="checkbox" id="remember" name="remember" />
            <span class="check-box">
              <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
            </span>
            <span class="remember-label">Ingat saya</span>
          </label>

          <button type="submit" class="btn-login" id="btn-login">
            <span id="btn-text">Masuk</span>
            <div class="spinner" id="spinner"></div>
          </button>
        </form>

        <div class="divider"></div>

        <p class="register-row">
          Belum punya akun? <a href="/register" id="create-link">Buat akun</a>
        </p>
      </div>

    <div class="toast" id="toast"></div>
  </div> 
</div>


  <script src="../js/login.js"></script>
  <script src="../js/bg.js"></script>
  
</body>
</html>
