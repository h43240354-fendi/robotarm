<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="../assets/arm.svg">
  <title>Buat Akun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/register.css">
  <link rel="stylesheet" href="../css/base.css">
</head>
<body>
<canvas id="iot-bg-canvas"></canvas>
<div class="app-shell auth-shell">
  <div class="register-page">
    <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 4 21 h 2.5 l 0.5 -2 h 1.5 l 0.5 2 a 2 2 0 0 1 4 0 l 0.5 -2 h 1.5 l 0.5 2 h 2.5" />
          <path d="M 7.5 19 c 0.8 -1.5 2.2 -2.5 4.5 -2.5 s 3.7 1 4.5 2.5" />
          <path d="M 10.8 16.5 L 8 12.8" />
          <path d="M 12.5 17 L 9.3 11.5" />
          <circle cx="6.5" cy="11.5" r="2.5" />
          <circle cx="6.5" cy="11.5" r="0.8" />
          <path d="M 8.2 9.8 L 11.2 6.8" />
          <path d="M 7.2 8.2 L 10.2 5.2" />
          <circle cx="12" cy="5" r="2.5" />
          <circle cx="12" cy="5" r="0.8" />
          <path d="M 13.8 6.8 L 16.2 9.2" />
          <path d="M 12.8 5.8 L 15.2 8.2" />
          <circle cx="17.2" cy="10.8" r="1.2" />
          <path d="M 18.2 10 L 21 10 L 21.5 13" />
          <path d="M 17.5 11.8 L 17.5 13.5 L 20 14" />
        </svg>
    </div>

    <div class="heading">
      <h1>Buat Akun</h1>
      <p>Bergabung dan kendalikan ARM Anda</p>
    </div>

      <form id="registerForm">

        <div class="field" id="field-email">
          <label for="email">Alamat Email</label>
          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input type="email" id="email" name="email" placeholder="user@gmail.com" autocomplete="email" />
            <button type="button" class="btn-send-otp" id="btnSendOtp">
              <span id="btnSendOtpText">Kirim OTP</span>
              <span class="spinner-sm" id="otpSpinner"></span>
            </button>
          </div>
          <span class="field-error" id="err-email">Silakan masukkan alamat email yang valid</span>
        </div>

        <div class="countdown-wrap" id="countdownWrap" style="display:none">
          <span class="countdown-label">Kirim Ulang OTP </span>
          <span class="countdown-val" id="countdownVal">60s</span>
        </div>

        <div class="field" id="field-otp">
          <label for="otp">Kode OTP</label>
          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/>
                <rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/>
              </svg>
            </span>
            <input type="text" id="otp" placeholder="6-digit code" maxlength="6" inputmode="numeric" />
          </div>
          <span class="field-error" id="err-otp">Silakan masukkan kode OTP 6 digit</span>
        </div>

        <div class="field" id="field-password">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar">
            <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
          <span class="field-error" id="err-password">Kata sandi harus terdiri minimal 8 karakter</span>
        </div>

        <div class="field" id="field-confirm">
          <label for="confirmPassword">Konfirmasi Password</label>
          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Show confirm password">
              <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="err-confirm">Kata sandi tidak cocok</span>
        </div>

        <button class="btn-register" id="btnRegister" type="button">
          <span id="btnText">Daftar</span>
          <span class="spinner" id="btnSpinner"></span>
        </button>

      </form>
    <p class="footer-link">Sudah punya akun? <a href="/">Login</a></p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/register.js"></script>
<script src="../js/bg.js"></script>


</body>
</html>
