<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/arm.svg">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/register.css">
  <link rel="stylesheet" href="../css/base.css">
</head>
<body>
<canvas id="iot-bg-canvas"></canvas>
<div class="app-shell auth-shell">
  <div class="reset-page">
    <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="heading">
      <h1>Reset Password</h1>
      <p>Masukkan email terdaftar Anda untuk menerima OTP</p>
    </div>

      <div class="field" id="field-email">
        <label for="email">Alamat Email</label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="user@gmail.com" autocomplete="email" />
          <button type="button" class="btn-send-otp" id="btnSendOtp">
            <span id="btnSendOtpText">Kirim OTP</span>
            <span class="spinner-sm" id="otpSpinner"></span>
          </button>
        </div>
        <span class="field-hint">Verifikasi mungkin memakan waktu hingga 2 menit</span>
        <span class="field-error" id="err-email">Silakan masukkan alamat email yang valid</span>
      </div>

      <div class="countdown-wrap" id="countdownWrap" style="display:none">
        <span class="countdown-label">Kirim Ulang OTP </span>
        <span class="countdown-val" id="countdownVal">60s</span>
      </div>

      <div class="field" id="field-otp">
        <label for="otp">Kode OTP</label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/>
              <rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/>
            </svg>
          </span>
          <input type="text" id="otp" placeholder="6-digit kode" maxlength="6" inputmode="numeric" />
        </div>
        <span class="field-error" id="err-otp">Silakan masukkan kode OTP 6 digit.</span>
      </div>

      <div class="field" id="field-password">
        <label for="newPassword">Password Baru</label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password" />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
        </div>
        <span class="strength-label" id="strengthLabel"></span>
        <span class="field-error" id="err-password">Kata sandi harus terdiri minimal 8 karakter</span>
      </div>

      <div class="field" id="field-confirm">
        <label for="confirmPassword">Konfirmasi Password Baru</label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
          <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Show confirm password">
            <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-confirm">Kata sandi tidak cocok</span>
      </div>

      <button class="btn-register" id="btnUpdate" type="button">
        <span id="btnUpdateText">Perbarui Password</span>
        <span class="spinner" id="updateSpinner"></span>
      </button>

    <p class="footer-link">Ingat password? <a href="/">Login</a></p>

    </div>


  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/reset.js"></script>
<script src="../js/bg.js"></script>


</body>
</html>
